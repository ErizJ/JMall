server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA: all non-file routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API reverse proxy ─────────────────────────────────
    # The order matters: longer prefixes must come first.

    # user service
    location /api/users/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://user:8881;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # cart service
    location /api/user/shoppingCart/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://cart:8883;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # order service
    location /api/user/order/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://order:8884;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/order/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://order:8884;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # collect service
    location /api/user/collect/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://collect:8885;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # product service
    location /api/product/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://product:8882;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # management service (includes /api/resources/carousel)
    location /api/resources/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://management:8886;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/management/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://management:8886;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # payment service
    location /api/payment/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://payment:8887;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # aichat service (SSE needs special proxy settings)
    location /api/aichat/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://aichat:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # static assets cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
