server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Vue Router history mode — fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy to backend services
    location /api/users/      { proxy_pass http://user:8881/users/;      proxy_set_header Host $host; }
    location /api/products/   { proxy_pass http://product:8882/products/; proxy_set_header Host $host; }
    location /api/cart/       { proxy_pass http://cart:8883/cart/;        proxy_set_header Host $host; }
    location /api/user/order/ { proxy_pass http://order:8884/user/order/; proxy_set_header Host $host; }
    location /api/order/      { proxy_pass http://order:8884/order/;      proxy_set_header Host $host; }
    location /api/collect/    { proxy_pass http://collect:8885/collect/;  proxy_set_header Host $host; }
    location /api/management/ { proxy_pass http://management:8886/management/; proxy_set_header Host $host; }
    location /api/payment/    { proxy_pass http://payment:8887/payment/;  proxy_set_header Host $host; }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
